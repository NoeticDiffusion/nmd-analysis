version: 2.0
modality: eeg

# ds004511 — EEG + BioPac physiological signals
# Gambling Game (GG) + Cognitive Control (CC) + Rest, 44 subjects
# TruScan 128-ch EEG at 3000 Hz; ECG/RSP/EDA/EMG via BioPac MP160 at 4000 Hz
# in separate BIDS *_physio.tsv.gz files under sub-*/ses-*/beh/.
#
# EAP priority: ECG ✓, RSP (belt) ✓, EDA ✓, Pupil ✗ (not recorded)
# Channel types after TruScan rename:
#   VEOG1/VEOG2 (channels 124/125) → eog
#   ECG / RESP / EDA injected via physio_tsv_inject
#
# DOI: 10.18112/openneuro.ds004511.v1.0.0
imports:
  - "./config_ingest_common_eeg.yaml"

datasets:
  - ds004511

source:
  doi: "10.18112/openneuro.ds004511.v1.0.0"
  url: "https://openneuro.org/datasets/ds004511"

paths:
  received_dir: "M:/datasets/received/openneuro"
  processed_dir: "J:/processed/openneuro"
  dataset_received_dirs:
    ds004511: "M:/datasets/received/openneuro/ds004511"

preprocess:
  # TruScan EEG system: channels are numeric (1-128); rename to 10-5 standard.
  # Channels 124/125 → VEOG1/VEOG2 (typed eog automatically).
  # patch_invalid_edf_startdate handles malformed EDF headers from TruScan.
  datasets:
    ds004511:
      patch_invalid_edf_startdate: true
      channel_rename: "truescan_128_numeric_to_10_5"

      # Inject physiological channels from the BioPac *_physio.tsv.gz companion
      # file (located in beh/ folder, same sub/ses/task/run as the EEG file).
      # Columns from physio.json: time, ECG A, RSP A, EMG A, EMG B, EDA, Digital
      physio_tsv_inject:
        enabled: true
        path_strategy: "beh_sibling"   # replace eeg/ with beh/ in path
        sampling_frequency: 4000.0     # fallback if physio.json is absent
        channels:
          - {column: "ECG A, X, ECG2-R", name: "ECG",  type: "ecg",  unit: "V"}
          - {column: "RSP A, X, RSP2-R", name: "RESP", type: "resp", unit: "AU"}
          - {column: "EDA, Y, PPGED-R",  name: "EDA",  type: "gsr",  unit: "uS"}
          # EMG A/B: corrugator supercilii (per ds004511 BIDS/README physio
          # description). Not used as an EAP anchor component, but injected so
          # emg_rms is available as a facial-affect / muscle-artifact confound
          # check for the GG vs CC MNJ contrast (peer_review/pr_01.md, finding 7).
          - {column: "EMG A, X, EMG2-R",  name: "EMGA", type: "emg",  unit: "V"}
          - {column: "EMG B, X, EMG2-R",  name: "EMGB", type: "emg",  unit: "V"}

  eeg_csd:
    enabled: true
    lambda2: 1.0e-5
    stiffness: 4.0
    n_legendre_terms: 50
    min_eeg_channels: 16
    on_error: "warn"

  # ICA with VEOG proxy (VEOG1/VEOG2 typed eog after rename).
  # No ECG ICA removal: ECG signal is the anchor for HRV extraction.
  artifacts:
    method: "ica"
    ica_n_components: 20
    ica_method: "fastica"
    ica_random_state: 42
    ica_fit_highpass_hz: 1.0
    eog_proxy_channels: []        # VEOG1/VEOG2 are typed eog after rename
    ica_eog_threshold: 3.0
    ecg_channel: "ECG"            # injected channel name
    ica_ecg_threshold: 3.0
    ica_max_components_to_remove: 5

  channel_typing:
    enabled: true
    datasets:
      ds004511:
        rules:
          # After TruScan rename: channels 124→VEOG1, 125→VEOG2 (typed eog in rename fn).
          # Here we catch any residual numeric channels and also type the injected physio.
          - {regex: "^[0-9]+$",   type: "eeg"}    # un-renamed numerics (fallback)
          - {regex: "^EOG",       type: "eog"}
          - {regex: "^VEOG",      type: "eog"}
          - {regex: "^ECG$",      type: "ecg"}     # injected BioPac ECG
          - {regex: "^RESP$",     type: "resp"}    # injected BioPac respiration
          - {regex: "^EDA$",      type: "gsr"}     # injected BioPac EDA (native MNE "gsr" type)
          - {regex: "^EMGA$",     type: "emg"}     # injected BioPac corrugator EMG (channel A)
          - {regex: "^EMGB$",     type: "emg"}     # injected BioPac corrugator EMG (channel B)
          - {regex: "^Foto$",     type: "misc"}    # TruScan photo-sensor
          - {regex: "^Sync$",     type: "misc"}    # sync channel
          - {regex: "^Gnd",       type: "misc"}
          - {regex: "^Batt",      type: "misc"}
          - {regex: "^Ref$",      type: "misc"}

metadata_extraction:
  datasets:
    ds004511:
      group:
        default: "Healthy"
      task:
        from_filename: true
        normalize:
          gg: "gambling"
          GG: "gambling"
          cc: "cognitive_control"
          CC: "cognitive_control"
          rest: "rest"
          Rest: "rest"

indexing:
  multimodal_bundles:
    enabled: false   # single EEG+physio file per session; no separate modality files

robustness:
  ensembles:
    enabled: true
    min_channels: 3
    groups:
      frontal: ["Fp1", "Fp2", "F3", "F4", "Fz", "F7", "F8", "AF3", "AF4", "AF7", "AF8"]
      central: ["FC1", "FC2", "C3", "Cz", "C4", "FC3", "FC4", "FCz"]
      parietal_occipital: ["P3", "P4", "Pz", "O1", "O2", "PO3", "PO4", "Oz", "P7", "P8"]
      temporal: ["T7", "T8", "TP7", "TP8"]

features:
  eeg:
    spectral:
      bands:
        delta: true
        theta: true
        alpha: true
        beta: true
        gamma: true
        highfreq_power_30_45: true
      ratios:
        alpha_theta: true
        beta_alpha: true
      alpha_peak_frequency: true
      median_frequency: true
      spectral_edge_95: true
    complexity:
      spectral_entropy: true
      permutation_entropy: true
      hjorth_complexity: true
      hjorth_mobility: false

  ecg:
    enabled: true
    hrv:
      enabled: true
      rmssd: true
      sdnn: true
      pnn50: true
      dfa: true
      sample_entropy: true

  resp:
    enabled: true
    rate_bpm: true
    period_s: true
    amplitude: true
    regularity: true
    phase_consistency: true
    pause_fraction: true
    depth_index: true
    slowing_index: true
    anchor_index: true

  eog:
    enabled: true
    blink_rate: true
    blink_amplitude: true
    blink_duration: true
    saccade_rate: true
    saccade_amplitude: true
    eye_stability_index: true

  cardioresp:
    enabled: true
    rsa: true
    coherence: true
    plv: true
    xcorr: true

  anchor_state:
    version: "v0.2"
    enabled: true

  # EDA/GSR: tonic SCL + phasic SCR events from the injected BioPac EDA
  # channel (typed "gsr" natively — see preprocess.datasets.ds004511.
  # physio_tsv_inject above). Uses neurokit2 when available.
  eda:
    enabled: true

# Classic qEEG comparator columns (band power, ratios, alpha peak, SpEn, PE,
# Hjorth complexity), computed alongside the MNPS/MNJ geometry. Added to give
# the embodied_anchoring_ds004511_gg_cc article a conventional-EEG baseline
# for the GG vs CC discrimination claim (peer_review/pr_01.md, finding 6).
conventional_eeg:
  enabled: true
  packs: ["tier1", "complexity"]

summarize:
  allow_group_collisions: false

# Enable global MNPS + regional MNPS over electrode groups.
regional_mnps:
  enabled: true
  stratified:
    enabled: true
  block_jacobians:
    enabled: true

mnps_9d:
  block_jacobians:
    enabled: true
    preset: mde_families_v1
    csv_output: "stratified_block_jacobians_subjects.csv"
