dataset: ds005917
description: "Cleaned -> analysis config for ds005917 post-ketamine contrasts"

input:
  cleaned_root: "../data/cleaned"

output:
  directory: "../data/analysis"
  filename_pattern: "{dataset}_{analysisType}_{timestamp}.parquet"
  timestamp_format: "%Y%m%d_%H%M%S"
  parquet:
    compression: snappy
    index: false

runtime:
  fail_on_missing_input: true
  continue_on_error: false

qc:
  require_finite_ok: true
  exclude_not_testable: true
  exclude_validity_limited: false

design:
  pairing_keys:
    - subject_id
  condition_column: condition
  group_column: group

statistics:
  permutation_n: 2000
  bootstrap_n: 1000
  random_seed: 5917
  min_group_n: 3
  min_pairs: 3
  fdr_group_by:
    - contrast_name
    - analysis_type

blocks:
  global_mnps_3d:
    enabled: true
  global_mnps_jacobian_3d:
    enabled: true
    validity:
      min:
        n_windows: 50
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_9d:
    enabled: true
  global_mnps_jacobian_9d:
    enabled: true
    validity:
      min:
        n_windows: 50
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_jacobian_9d_block_jacobian:
    enabled: true
  regional_3d:
    enabled: true
  regional_9d:
    enabled: true
  reachability_cones:
    enabled: true
    validity:
      min:
        tube_log_det_split_half_rho: 0.5
        tube_d_eff_split_half_rho: 0.5
        tube_log_det_split_half_n: 50
        tube_d_eff_split_half_n: 50
      max:
        pred_err_h1: 1.0
        near_singular_rate: 0.1
  tier2_emmi:
    enabled: true
  dist_summary:
    enabled: true
  tier2_jacobian:
    enabled: true
  tau_summary:
    enabled: true
  robust_summary:
    enabled: true
  features_raw:
    enabled: true
  features_robust_z:
    enabled: true

contrasts:
  - name: Healthy_baseline_vs_ketamine_d2
    type: paired
    left:
      group: Healthy
      condition: baseline
    right:
      group: Healthy
      condition: ketamine_d2
    subset:
      group: [Healthy]
      condition: [baseline, ketamine_d2]

  - name: MDD_baseline_vs_ketamine_d2
    type: paired
    left:
      group: MDD
      condition: baseline
    right:
      group: MDD
      condition: ketamine_d2
    subset:
      group: [MDD]
      condition: [baseline, ketamine_d2]

  - name: BP_baseline_vs_ketamine_d2
    type: paired
    left:
      group: BP
      condition: baseline
    right:
      group: BP
      condition: ketamine_d2
    subset:
      group: [BP]
      condition: [baseline, ketamine_d2]
