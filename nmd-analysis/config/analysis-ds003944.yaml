dataset: ds003944
description: "Cleaned -> analysis config for ds003944 cohort-anchored psychosis contrasts"

input:
  cleaned_root: "../data/cleaned"

coordinate_contract: cohort_anchored

output:
  directory: "../data/analysis"
  filename_pattern: "{dataset}_{analysisType}_{timestamp}.parquet"
  timestamp_format: "%Y%m%d_%H%M%S"
  parquet:
    compression: snappy
    index: false

runtime:
  fail_on_missing_input: true
  continue_on_error: false

qc:
  require_finite_ok: true
  exclude_not_testable: true
  exclude_validity_limited: false

design:
  pairing_keys:
    - subject_id
    - session
    - run
  condition_column: condition
  group_column: medication_group

statistics:
  permutation_n: 2000
  bootstrap_n: 1000
  random_seed: 3944
  min_group_n: 3
  min_pairs: 3
  fdr_group_by:
    - contrast_name
    - analysis_type

blocks:
  global_mnps_3d:
    enabled: true
  trajectory_dynamics:
    enabled: true
  global_mnps_jacobian_3d:
    enabled: true
    validity:
      min:
        n_windows: 50
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_9d:
    enabled: true
  global_mnps_jacobian_9d:
    enabled: true
    validity:
      min:
        n_windows: 50
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_jacobian_9d_block_jacobian:
    enabled: true
  regional_3d:
    enabled: false
  regional_9d:
    enabled: false
  reachability_cones:
    enabled: false
  tier2_emmi:
    enabled: false
  dist_summary:
    enabled: false
  tier2_jacobian:
    enabled: false
  tau_summary:
    enabled: false
  robust_summary:
    enabled: false
  features_raw:
    enabled: false
  features_robust_z:
    enabled: false

contrasts:
  - name: FEP_unmedicated_vs_Healthy
    left:
      medication_group: Healthy
    right:
      medication_group: FEP unmedicated
    subset:
      medication_group: [Healthy, FEP unmedicated]

  - name: FEP_medicated_vs_Healthy
    left:
      medication_group: Healthy
    right:
      medication_group: FEP medicated
    subset:
      medication_group: [Healthy, FEP medicated]

  - name: FEP_medicated_vs_FEP_unmedicated
    left:
      medication_group: FEP unmedicated
    right:
      medication_group: FEP medicated
    subset:
      medication_group: [FEP unmedicated, FEP medicated]
