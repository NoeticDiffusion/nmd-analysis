dataset: ds005555
description: "Cleaned -> analysis config for ds005555 sleep-stage contrasts"

input:
  cleaned_root: "../data/cleaned"

output:
  directory: "../data/analysis"
  filename_pattern: "{dataset}_{analysisType}_{timestamp}.parquet"
  timestamp_format: "%Y%m%d_%H%M%S"
  parquet:
    compression: snappy
    index: false

runtime:
  fail_on_missing_input: true
  continue_on_error: false

qc:
  require_finite_ok: true
  exclude_not_testable: true
  exclude_validity_limited: false

design:
  pairing_keys:
    - subject_id
  condition_column: condition
  group_column: group

statistics:
  permutation_n: 2000
  bootstrap_n: 1000
  random_seed: 5555
  min_group_n: 3
  min_pairs: 3
  fdr_group_by:
    - contrast_name
    - analysis_type

blocks:
  global_mnps_3d:
    enabled: true
  global_mnps_jacobian_3d:
    enabled: true
    validity:
      min:
        n_windows: 15
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_9d:
    enabled: true
  global_mnps_jacobian_9d:
    enabled: true
    validity:
      min:
        n_windows: 15
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  regional_mnps_jacobian_3d:
    enabled: true
  regional_mnps_jacobian_9d:
    enabled: true
  regional_3d:
    enabled: true
  regional_9d:
    enabled: true
  reachability_cones:
    enabled: true
    validity:
      min:
        n_timepoints: 20
  regional_reachability_cones_3d:
    enabled: true
    validity:
      min:
        n_timepoints: 20
  tier2_emmi:
    enabled: true
  dist_summary:
    enabled: true
  tier2_jacobian:
    enabled: true
  sleep_stage_dynamics:
    enabled: true
  tau_summary:
    enabled: true
  robust_summary:
    enabled: true
  features_robust_z_sleep:
    enabled: true

contrasts:
  - name: Awake_vs_NREM3
    type: paired
    left:
      condition: nrem3
    right:
      condition: awake
    subset:
      condition: [awake, nrem3]

  - name: REM_vs_NREM3
    type: paired
    left:
      condition: nrem3
    right:
      condition: rem
    subset:
      condition: [rem, nrem3]

  - name: NREM2_vs_NREM3
    type: paired
    left:
      condition: nrem3
    right:
      condition: nrem2
    subset:
      condition: [nrem2, nrem3]
