dataset: ds004574
description: "Cleaned -> analysis config for ds004574 Parkinson auditory oddball contrasts"

input:
  cleaned_root: "../data/cleaned"

coordinate_contract: subject_anchored

output:
  directory: "../data/analysis"
  filename_pattern: "{dataset}_{analysisType}_{timestamp}.parquet"
  timestamp_format: "%Y%m%d_%H%M%S"
  parquet:
    compression: snappy
    index: false

runtime:
  fail_on_missing_input: true
  continue_on_error: false

qc:
  require_finite_ok: true
  exclude_not_testable: true
  exclude_validity_limited: false

design:
  pairing_keys:
    - subject_id
  condition_column: condition
  group_column: group

statistics:
  permutation_n: 2000
  bootstrap_n: 1000
  random_seed: 4574
  min_group_n: 3
  min_pairs: 3
  fdr_group_by:
    - contrast_name
    - analysis_type

blocks:
  global_mnps_3d:
    enabled: true
  trajectory_dynamics:
    enabled: true
  global_mnps_jacobian_3d:
    enabled: true
    validity:
      min:
        n_windows: 50
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_9d:
    enabled: true
  global_mnps_jacobian_9d:
    enabled: true
    validity:
      min:
        n_windows: 50
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_9d_block_jacobian:
    enabled: false
  global_mnps_jacobian_9d_block_jacobian:
    enabled: false
  regional_mnps_jacobian_3d:
    enabled: false
  regional_mnps_jacobian_9d:
    enabled: false
  regional_3d:
    enabled: false
  regional_9d:
    enabled: false
  reachability_cones:
    enabled: true
    validity:
      min:
        tube_log_det_split_half_rho: 0.5
        tube_d_eff_split_half_rho: 0.5
        tube_log_det_split_half_n: 50
        tube_d_eff_split_half_n: 50
      max:
        pred_err_h1: 1.0
        near_singular_rate: 0.1
  regional_reachability_cones_3d:
    enabled: false
  tier2_emmi:
    enabled: false
  dist_summary:
    enabled: false
  tier2_jacobian:
    enabled: true
  tau_summary:
    enabled: true
  robust_summary:
    enabled: false
  features_raw:
    enabled: false
  features_robust_z:
    enabled: false

contrasts:
  - name: Control_vs_Parkinson
    left:
      group: Control
      condition: not_applicable
    right:
      group: Parkinson
      condition: not_applicable
    subset:
      group: [Control, Parkinson]
      condition: [not_applicable]
