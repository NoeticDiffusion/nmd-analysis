dataset: Sedation-RestingState
description: "Cleaned -> analysis config for Sedation-RestingState propofol contrasts"

input:
  cleaned_root: "data/cleaned"

output:
  directory: "data/analysis"
  filename_pattern: "{dataset}_{analysisType}_{timestamp}.parquet"
  timestamp_format: "%Y%m%d_%H%M%S"
  parquet:
    compression: snappy
    index: false

runtime:
  fail_on_missing_input: true
  continue_on_error: false

qc:
  require_finite_ok: true
  exclude_not_testable: true
  exclude_validity_limited: false

design:
  pairing_keys:
    - subject_id
  condition_column: condition
  group_column: group

statistics:
  permutation_n: 2000
  bootstrap_n: 1000
  random_seed: 20260325
  min_group_n: 3
  min_pairs: 3
  fdr_group_by:
    - contrast_name
    - analysis_type

blocks:
  global_mnps_3d:
    enabled: true
  global_mnps_jacobian_3d:
    enabled: true
    validity:
      min:
        n_windows: 15
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_9d:
    enabled: true
  global_mnps_jacobian_9d:
    enabled: true
    validity:
      min:
        n_windows: 15
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_jacobian_9d_block_jacobian:
    enabled: true
  reachability_cones:
    enabled: true
    validity:
      min:
        tube_log_det_split_half_rho: 0.5
        tube_d_eff_split_half_rho: 0.5
      max:
        pred_err_h1: 1.0
        near_singular_rate: 0.1
  trajectory_dynamics:
    enabled: true
  tier2_emmi:
    enabled: true
  tier2_jacobian:
    enabled: true
  features_raw:
    enabled: true
    validity:
      min:
        feature_n_finite: 20
  features_robust_z:
    enabled: true
    validity:
      min:
        feature_n_finite: 20

contrasts:
  - name: Healthy_awake_vs_Healthy_sedated
    type: paired
    left:
      group: Healthy
      condition: awake
    right:
      group: Healthy
      condition: sedated
    subset:
      group: [Healthy]
      condition: [awake, sedated]

  - name: Healthy_sedated_vs_Healthy_unresponsive
    type: paired
    left:
      group: Healthy
      condition: sedated
    right:
      group: Healthy
      condition: unresponsive
    subset:
      group: [Healthy]
      condition: [sedated, unresponsive]

  - name: Healthy_awake_vs_Healthy_unresponsive
    type: paired
    left:
      group: Healthy
      condition: awake
    right:
      group: Healthy
      condition: unresponsive
    subset:
      group: [Healthy]
      condition: [awake, unresponsive]

  - name: Healthy_unresponsive_vs_Healthy_recovery
    type: paired
    left:
      group: Healthy
      condition: unresponsive
    right:
      group: Healthy
      condition: recovery
    subset:
      group: [Healthy]
      condition: [unresponsive, recovery]

  - name: Healthy_awake_vs_Healthy_recovery
    type: paired
    left:
      group: Healthy
      condition: awake
    right:
      group: Healthy
      condition: recovery
    subset:
      group: [Healthy]
      condition: [awake, recovery]
