dataset: ANPHY
description: "Cleaned -> analysis config for ANPHY sleep-stage contrasts"

input:
  cleaned_root: "data/cleaned"

output:
  directory: "data/analysis"
  filename_pattern: "{dataset}_{analysisType}_{timestamp}.parquet"
  timestamp_format: "%Y%m%d_%H%M%S"
  parquet:
    compression: snappy
    index: false

runtime:
  fail_on_missing_input: true
  continue_on_error: false

qc:
  require_finite_ok: true
  exclude_not_testable: true
  exclude_validity_limited: false

design:
  pairing_keys:
    - subject_id
    - session
    - run
  condition_column: condition
  group_column: group

statistics:
  permutation_n: 2000
  bootstrap_n: 1000
  random_seed: 6202026
  min_group_n: 3
  min_pairs: 3
  fdr_group_by:
    - contrast_name
    - analysis_type

blocks:
  global_mnps_3d:
    enabled: true
  global_mnps_jacobian_3d:
    enabled: true
    validity:
      min:
        n_windows: 15
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_9d:
    enabled: true
  global_mnps_jacobian_9d:
    enabled: true
    validity:
      min:
        n_windows: 15
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  global_mnps_jacobian_9d_block_jacobian:
    enabled: true
  regional_mnps_jacobian_3d:
    enabled: true
    metrics:
      - frobenius_norm_mean
      - frobenius_norm_median
      - trace_mean
      - trace_median
      - rotation_norm_mean
      - rotation_norm_median
      - anisotropy_abs_eig_mean
      - anisotropy_abs_eig_median
      - spectral_radius_mean
      - spectral_radius_median
      - rotational_power_mean
      - rotational_power_median
    validity:
      min:
        n_windows: 15
      max:
        jacobian_near_singular_rate: 0.1
      require_true:
        - eig_ok
  regional_mnps_jacobian_9d:
    enabled: true
    metrics:
      - block_frobenius_mean
      - block_trace_mean
      - block_anisotropy_mean
      - c_rot_mean
      - c_sym_mean
    validity:
      min:
        n_timepoints: 20
  regional_3d:
    enabled: false
  regional_9d:
    enabled: false
  reachability_cones:
    enabled: true
    validity:
      min:
        n_timepoints: 20
  regional_reachability_cones_3d:
    enabled: true
    metrics:
      - tube_log_det_median
    validity:
      min:
        n_timepoints: 20
  features_robust_z_sleep:
    enabled: true
    metrics:
      - feature_median
    validity:
      min:
        feature_n_finite: 20
  features_raw_sleep:
    enabled: true
    metrics:
      - feature_median
    validity:
      min:
        feature_n_finite: 20
  tier2_emmi:
    enabled: true
  trajectory_dynamics:
    enabled: true
  tier2_jacobian:
    enabled: true

contrasts:
  - name: C1_wake_vs_nrem3
    type: paired
    left:
      condition: nrem3
    right:
      condition: awake
    subset:
      condition: [awake, nrem3]

  - name: C2_rem_vs_nrem3
    type: paired
    left:
      condition: nrem3
    right:
      condition: rem
    subset:
      condition: [rem, nrem3]

  - name: C3_nrem2_vs_nrem3
    type: paired
    left:
      condition: nrem3
    right:
      condition: nrem2
    subset:
      condition: [nrem2, nrem3]

negative_controls:
  - name: NC1_within_subject_stage_label_permutation
    type: nc1_within_subject_stage_permutation
    source_contrast: C1_wake_vs_nrem3
    analyses:
      - reachability_cones
    metrics:
      - tube_log_det_median
    stage_order:
      - awake
      - nrem2
      - nrem3
      - rem
    permutation_n: 1000

  - name: NC2_sign_flip_surrogate
    type: nc2_sign_flip_surrogate
    source_contrast: C1_wake_vs_nrem3
    analyses:
      - reachability_cones
    metrics:
      - tube_log_det_median
    permutation_n: 1000
